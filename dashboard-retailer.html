<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retailer Dashboard - Supply Chain Management</title>
    <link rel="icon" href="assets/img/blockchain-logo.svg" type="image/svg+xml">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/img/blockchain-logo.png">
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/3.9.1/chart.min.js"></script>
</head>
<body>
    <div class="wrapper">
        <aside class="sidebar" id="sidebar" aria-label="Main navigation">
            <div class="sidebar-header">
                <h2><i class="fas fa-store"></i> Retailer</h2>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav">
                <a href="#" id="link-dashboard" data-section="dashboard"><i class="fas fa-chart-bar"></i> Dashboard</a>
                <a href="#" id="link-update" data-section="update"><i class="fas fa-edit"></i> Update Status</a>
                <a href="#" id="link-verify" data-section="verify"><i class="fas fa-check-circle"></i> Verify Products</a>
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>
        <div class="main-content">
            <header class="topbar">
                <button id="menu-toggle" class="menu-toggle" aria-label="Toggle menu">Menu</button>
                <div class="topbar-right">
                    <span id="user-role">Loading...</span>
                </div>
            </header>
            <section class="dashboard" id="dashboard-section">
                <!-- Dynamic content -->
            </section>
        </div>
    </div>

    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/ui-utils.js"></script>
    <script src="assets/js/blockchain.js"></script>
    <script src="assets/js/verification.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/tracking.js"></script>
    <script src="assets/js/realtime.js"></script>
    <script>
        document.querySelectorAll('[data-section]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const section = link.dataset.section;
                loadRetailerSection(section);
            });
        });

        async function loadRetailerSection(section) {
            const dashboardSection = document.getElementById('dashboard-section');
            
            switch(section) {
                case 'dashboard':
                    loadDashboard();
                    break;
                case 'update':
                    dashboardSection.innerHTML = '<div class="card"><h3>Update Supply Chain Status</h3><div id="status-form-container">Loading...</div></div>';
                    if (tracking) tracking.init();
                    break;
                case 'verify':
                    dashboardSection.innerHTML = '<div class="card"><h3>Verify Product Authenticity</h3><div id="verify-form-container">Loading...</div></div>';
                    loadVerifyForm();
                    break;
                default:
                    loadDashboard();
            }
        }

        async function loadDashboard() {
            const dashboardSection = document.getElementById('dashboard-section');
            dashboardSection.innerHTML = `
                <div class="card">
                    <h3>Retailer Dashboard</h3>
                    <p>Update product statuses and verify authenticity before stocking</p>
                </div>
                <div class="cards-grid">
                    <div class="stat-card">
                        <h4><i class="fas fa-tasks"></i> Quick Actions</h4>
                        <p style="margin:0.5rem 0;font-size:0.9rem;">Verify products and update status</p>
                    </div>
                </div>
            `;
        }

        function loadVerifyForm() {
            const container = document.getElementById('verify-form-container');
            container.innerHTML = `
                <form id="verify-form" style="max-width:600px;">
                    <div class="form-group">
                        <label for="verify-product-id">Product ID to Verify</label>
                        <input type="text" id="verify-product-id" placeholder="Paste product UUID" required>
                    </div>
                    <button type="submit" class="btn">Verify Product</button>
                    <div id="verify-error" class="error-message" style="margin-top:1rem;"></div>
                </form>
                <div id="verify-result" style="margin-top:2rem;"></div>
            `;

            document.getElementById('verify-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const rawInput = document.getElementById('verify-product-id').value.trim();
                let productId = rawInput;
                const resultDiv = document.getElementById('verify-result');
                const errorDiv = document.getElementById('verify-error');
                errorDiv.textContent = '';
                resultDiv.innerHTML = '<p style="text-align:center;color:var(--text-light);">Verifying...</p>';

                try {
                    try {
                        const parsed = new URL(rawInput, window.location.origin);
                        const v = parsed.searchParams.get('verify') || parsed.searchParams.get('id') || parsed.searchParams.get('product');
                        if (v) productId = v;
                        else {
                            const parts = parsed.pathname.split('/').filter(Boolean);
                            if (parts.length) productId = parts[parts.length - 1];
                        }
                    } catch (err) {
                        if (rawInput.includes('verify=')) productId = rawInput.split('verify=')[1].split('&')[0];
                    }

                    if (Verification) {
                        const result = await Verification.verifyProduct(productId.trim(), supabaseClient);
                        Verification.renderVerificationResult(resultDiv, result, 'retailer');
                    }
                } catch (err) {
                    console.error(err);
                    errorDiv.textContent = err.message || 'Verification error';
                }
            });
        }

        window.addEventListener('load', () => {
            loadRetailerSection('dashboard');
        });
    </script>
</body>
</html>
