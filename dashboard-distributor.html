<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Distributor Dashboard - Supply Chain Management</title>
    <link rel="icon" href="assets/img/blockchain-logo.svg" type="image/svg+xml">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/img/blockchain-logo.png">
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/3.9.1/chart.min.js"></script>
</head>
<body>
    <div class="wrapper">
        <aside class="sidebar" id="sidebar" aria-label="Main navigation">
            <div class="sidebar-header">
                <h2><i class="fas fa-truck"></i> Distributor</h2>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav">
                <a href="#" id="link-dashboard" data-section="dashboard"><i class="fas fa-chart-bar"></i> Dashboard</a>
                <a href="#" id="link-update" data-section="update"><i class="fas fa-edit"></i> Update Status</a>
                <a href="#" id="link-track" data-section="track"><i class="fas fa-search"></i> Track Products</a>
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>
        <div class="main-content">
            <header class="topbar">
                <button id="menu-toggle" class="menu-toggle" aria-label="Toggle menu">Menu</button>
                <div class="topbar-right">
                    <span id="user-role">Loading...</span>
                </div>
            </header>
            <section class="dashboard" id="dashboard-section">
                <!-- Dynamic content -->
            </section>
        </div>
    </div>

    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/ui-utils.js"></script>
    <script src="assets/js/blockchain.js"></script>
    <script src="assets/js/verification.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/tracking.js"></script>
    <script src="assets/js/realtime.js"></script>
    <script>
        document.querySelectorAll('[data-section]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const section = link.dataset.section;
                loadDistributorSection(section);
            });
        });

        async function loadDistributorSection(section) {
            const dashboardSection = document.getElementById('dashboard-section');
            
            switch(section) {
                case 'dashboard':
                    loadDashboard();
                    break;
                case 'update':
                    dashboardSection.innerHTML = '<div class="card"><h3>Update Supply Chain Status</h3><div id="status-form-container">Loading...</div></div>';
                    if (tracking) tracking.init();
                    break;
                case 'track':
                    dashboardSection.innerHTML = '<div class="card"><h3>Track Product</h3><div id="track-form-container">Loading...</div></div>';
                    if (tracking) tracking.initCustomer();
                    break;
                default:
                    loadDashboard();
            }
        }

        async function loadDashboard() {
            const dashboardSection = document.getElementById('dashboard-section');
            dashboardSection.innerHTML = `
                <div class="card">
                    <h3>Distributor Dashboard</h3>
                    <p>Update product statuses and track items through the supply chain</p>
                </div>
                <div class="cards-grid">
                    <div class="stat-card">
                        <h4><i class="fas fa-tasks"></i> Quick Actions</h4>
                        <p style="margin:0.5rem 0;font-size:0.9rem;">Update status and track products</p>
                    </div>
                </div>
            `;
        }

        window.addEventListener('load', () => {
            loadDistributorSection('dashboard');
        });
    </script>
</body>
</html>
