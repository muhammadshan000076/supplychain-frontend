<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Decentralized Supply Chain Management System</title>
    <link rel="icon" href="assets/img/blockchain-logo.svg" type="image/svg+xml">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/img/blockchain-logo.png">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>
    <header class="header">
        <div class="container" style="display: flex; align-items: center; gap: 1rem;">
            <img src="assets/img/blockchain-logo.png" alt="Blockchain Logo" class="app-logo app-logo--large">
            <h1>Decentralized Supply Chain Management System</h1>
            <nav>
                <a href="login.html">Login</a>
            </nav>
        </div>
    </header>

    <div class="auth-container">
        <form id="signup-form" class="auth-form">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="font-size:2.5rem; margin-bottom:1rem; color:var(--secondary);">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h2>Create Account</h2>
                <p style="color: var(--text-light); font-size: 0.95rem; margin-top:0.5rem;">Join the decentralized supply chain network</p>
            </div>

            <div class="form-group">
                <label for="name"><i class="fas fa-user"></i> Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-key"></i> Password (min. 6 characters)</label>
                <input type="password" id="password" placeholder="••••••••" minlength="6" required>
            </div>

            <div class="form-group">
                <label for="role"><i class="fas fa-industry"></i> Your Role</label>
                <select id="role" required>
                    <option value="">-- Select your role --</option>
                    <option value="manufacturer">Manufacturer (Register Products)</option>
                    <option value="distributor">Distributor (Track & Update Products)</option>
                    <option value="retailer">Retailer (Update & Verify Products)</option>
                    <option value="customer">Customer (Track & Verify Products)</option>
                </select>
            </div>

            <button type="submit" class="btn" style="width: 100%; padding: 1rem; margin-top: 1.5rem; font-size: 1rem;">
                <i class="fas fa-user-check"></i> Create Account
            </button>

            <div id="error-msg" class="error-message"></div>

            <hr style="margin: 2rem 0; border: none; border-top: 1px solid var(--border); opacity: 0.5;">

            <p style="text-align: center; color: var(--text-light); font-size: 0.95rem;">
                Already have an account? <a href="login.html"><strong>Sign in here</strong></a>
            </p>
        </form>
    </div>

    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/ui-utils.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        // Ensure form listeners are properly attached after DOM load
        function ensureFormListenersAttached() {
            const signupForm = document.getElementById('signup-form');
            if (signupForm && !signupForm.dataset.listenerAttached) {
                signupForm.addEventListener('submit', handleSignup);
                signupForm.dataset.listenerAttached = 'true';
                console.log('Signup form listener attached');
            }
        }

        // Attach listener immediately if DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', ensureFormListenersAttached);
        } else {
            ensureFormListenersAttached();
        }

        // Also check after a short delay
        setTimeout(ensureFormListenersAttached, 100);
    </script>
    <footer class="footer">
        <div class="container">
            <p>&copy; <span id="year"></span> Decentralized Supply Chain Management System using Blockchain
                <a href="about.html" style="color:#fff; margin-left:1rem; text-decoration:underline;">About Us</a>
            </p>
        </div>
    </footer>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
